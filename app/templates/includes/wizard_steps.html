<div class="wizard-steps">
    <div class="wizard-step {% if current_step == 1 %}active{% elif current_step > 1 %}done{% endif %}">
        <span class="step-num">1</span><span class="step-label">Quiz-Details</span>
    </div>
    <div class="wizard-connector"></div>
    <div class="wizard-step {% if current_step == 2 %}active{% elif current_step > 2 %}done{% endif %}">
        <span class="step-num">2</span><span class="step-label">Kategorien</span>
    </div>
    <div class="wizard-connector"></div>
    <div class="wizard-step {% if current_step == 3 %}active{% endif %}">
        <span class="step-num">3</span><span class="step-label">Fragen</span>
    </div>
</div>
