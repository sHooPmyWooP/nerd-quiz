<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nerd Quiz{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231A1A2E'/><text x='16' y='23' font-family='system-ui,sans-serif' font-size='22' font-weight='900' text-anchor='middle' fill='%23FF6B2B'>?</text></svg>">
    <style>
        :root {
            --orange:        #FF6B2B;
            --orange-light:  #FF9A5C;
            --orange-pale:   #FFF0E8;
            --green:         #2DBE6C;
            --green-light:   #5DD68E;
            --green-pale:    #E8FBF1;
            --dark:          #1A1A2E;
            --text:          #2C2C3E;
            --muted:         #7A7A9A;
            --white:         #FFFFFF;
            --radius:        12px;
            --shadow:        0 4px 16px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #F9F5F0;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: var(--dark);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .logo span.n { color: var(--orange); }
        .logo span.q { color: var(--green); }
        .logo span.rest { color: var(--white); }

        nav {
            display: flex;
            gap: 0.5rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.15s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.12);
        }

        /* ── Messages ── */
        .messages {
            list-style: none;
            padding: 0.75rem 2rem;
        }

        .messages li {
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .messages li.success { background: var(--green-pale);  color: #1A7A47; border-left: 4px solid var(--green); }
        .messages li.error   { background: #FFF0F0;            color: #A63232; border-left: 4px solid #E05555; }
        .messages li.info    { background: var(--orange-pale); color: #A04A10; border-left: 4px solid var(--orange); }
        .messages li.warning { background: #FFFBE8;            color: #7A5A00; border-left: 4px solid #F0C020; }

        /* ── Main content ── */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Card ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: filter 0.15s, transform 0.1s;
        }

        .btn:hover  { filter: brightness(1.08); }
        .btn:active { transform: scale(0.97); }

        .btn-primary   { background: var(--orange);      color: var(--white); }
        .btn-secondary { background: var(--green);       color: var(--white); }
        .btn-outline   { background: transparent; color: var(--orange); border: 2px solid var(--orange); }

        /* ── Page heading ── */
        h1, h2, h3 {
            font-weight: 800;
            line-height: 1.2;
        }

        h1 { font-size: 2rem;   color: var(--dark); }
        h2 { font-size: 1.4rem; color: var(--orange); }
        h3 { font-size: 1.1rem; color: var(--text); }

        /* ── Wizard steps ── */
        .wizard-steps {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .wizard-step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
        }

        .wizard-step.active  { color: var(--orange); }
        .wizard-step.done    { color: var(--green); }

        .step-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.82rem; font-weight: 700;
            background: #E0DAD4; color: var(--muted);
        }

        .wizard-step.active .step-num  { background: var(--orange); color: var(--white); }
        .wizard-step.done   .step-num  { background: var(--green);  color: var(--white); }

        .wizard-connector {
            flex: 1; height: 2px;
            background: #E0DAD4;
            margin: 0 0.75rem;
            max-width: 60px;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: var(--muted);
            border-top: 1px solid #EAE5DF;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <a class="logo" href="/">
        <span class="n">N</span><span class="rest">erd</span>&nbsp;<span class="q">Q</span><span class="rest">uiz</span>
    </a>
    <nav>
        {% block nav %}
        <a href="/">Übersicht</a>
        {% endblock %}
    </nav>
</header>

{% if messages %}
<ul class="messages">
    {% for message in messages %}
    <li class="{{ message.tags }}">{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    Nerd Quiz &mdash; möge der Nerdigste gewinnen
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
